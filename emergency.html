<!DOCTYPE html>
<html>
<head>
<title>Emergency</title>

<style>
body {
    background:black;
    color:white;
    text-align:center;
}

.nav {
    background:#111;
    padding:10px;
}
.nav a {
    color:white;
    margin:10px;
    text-decoration:none;
}

button {
    background:red;
    padding:30px;
    font-size:25px;
    border:none;
    border-radius:50%;
    color:white;
    margin-top:50px;
}

.alert {
    font-size:24px;
    margin-top:20px;
    animation: blink 0.5s infinite;
}

@keyframes blink {
    50% { opacity:0.2; }
}
</style>
</head>

<body>

<div class="nav">
    <a href="/">🏠 Dashboard</a>
    <a href="/monitor">📡 Monitor</a>
    <a href="/emergency">🚨 Emergency</a>
</div>

<h1>🚨 EMERGENCY MODE</h1>

<button onclick="sendSOS()">SOS</button>

<p id="msg"></p>

<script>
function sendSOS(){
    fetch("/sos")
    .then(res=>res.json())
    .then(data=>{
        let msg=document.getElementById("msg");
        msg.innerText=data.status;
        msg.classList.add("alert");
    });
}
</script>

</body>
</html>
